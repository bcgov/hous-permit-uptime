# Change these first
owner: bcgov # Your GitHub organization or username, where this repository lives
repo: hous-permit-uptime # The name of this repository

sites:
  - name:  BC Building Permit Hub
    url: https://buildingpermit.gov.bc.ca
assignees:
  - mymobanty

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  # cname: demo.upptime.js.org
  baseUrl: /hous-permit-uptime
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: BC Building Permit Status
  introTitle: "**Upptime** is an open-source uptime monitor and status page, to monitor the Building Permit Hub."
  introMessage: Status page for https://buildingpermit.gov.bc.ca
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  
# Upptime also supports notifications, assigning issues, and more
