# Change these first
owner: bcgov # Your GitHub organization or username, where this repository lives
repo: hous-permit-uptime # The name of this repository

sites:
  - name:  Building Permit Hub
    url: https://buildingpermit.gov.bc.ca
    
  - name: "External Dependencies: Authentication Service"
    url: https://status.loginproxy.gov.bc.ca/

  - name: "External Dependencies: BC Address Geocoder"
    url: https://geocoder.api.gov.bc.ca/sites

  - name: "External Dependencies: LTSA ParcelMap BC"
    url: https://maps.gov.bc.ca/arcserver/rest/

  - name: "External Dependencies: BC Admin Boundaries"
    url: https://delivery.maps.gov.bc.ca/arcgis/rest/
    
  - name: "External Dependencies: EPSG Registry"
    url: https://epsg.io/4326.json

  - name: "External Service: Archistar Platform (Canada)"
    url: https://status.archistar.ai/
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: "Archistar Platform - Canada Operational"

  - name: "External Dependencies: Keycloak Authentication"
    url: https://status.loginproxy.gov.bc.ca/statuspage/sso-keycloak-uptime/5830615
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: "Gold KeyCloak SSO Prod Service Uptime"
      
assignees:
  - mymobanty

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  # cname: demo.upptime.js.org
  baseUrl: /hous-permit-uptime
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Building Permit Status
  introTitle: "**Upptime** is an open-source uptime monitor and status page, to monitor the Building Permit Hub and External Services."
  introMessage: Status page for https://buildingpermit.gov.bc.ca
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  
# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
